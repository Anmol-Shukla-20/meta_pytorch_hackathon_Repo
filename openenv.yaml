name: email-triage-env
version: 1.0

actions:
  - mark_important
  - reply
  - schedule
  - ignore

observation:
  email_text: str
  sender: str
  urgency: float
  step: int

reward_range: [-10, 10]

# Root task mapping to explicit folders for deep validation
tasks:
  - id: "easy"
    path: "tasks/easy"
  - id: "medium"
    path: "tasks/medium"
  - id: "hard"
    path: "tasks/hard"